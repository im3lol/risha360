<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body { font-family: "Segoe UI", system-ui, sans-serif; max-width: 480px;
        margin: 40px auto; padding: 0; color: #1e1b2e; }
      .head { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: #fff;
        padding: 20px 22px; border-radius: 14px 14px 0 0; display: flex; align-items: center; gap: 13px; }
      .head svg { width: 40px; height: 40px; }
      .head h1 { font-size: 18px; margin: 0; }
      .head p { font-size: 12px; margin: 3px 0 0; opacity: .85; }
      .card { border: 1px solid #eee9fb; border-top: none; border-radius: 0 0 14px 14px;
        padding: 22px; }
      p.note { font-size: 12.5px; color: #666; line-height: 1.5; }
      label { display: block; margin: 16px 0 5px; font-size: 12px; font-weight: 600;
        text-transform: uppercase; letter-spacing: .4px; color: #8b8a95; }
      input { width: 100%; padding: 10px 12px; border: 1.5px solid #e7e7ee; border-radius: 9px;
        font-size: 13px; outline: none; }
      input:focus { border-color: #7c3aed; }
      button { margin-top: 20px; padding: 11px 22px; color: #fff;
        background: linear-gradient(135deg, #8b5cf6, #6d28d9); border: none; border-radius: 10px;
        font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(124,58,237,.3); }
      #saved { color: #16a34a; font-size: 13px; margin-left: 12px; font-weight: 600; }
      code { background: #f3f0fc; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="head">
      <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M40 96 C40 58 62 32 96 28 C94 64 76 90 46 92 Z" />
          <path d="M44 94 L90 40" />
          <path d="M56 78 L74 73" /><path d="M64 68 L82 63" /><path d="M72 58 L88 53" />
          <path d="M40 96 L30 106" />
        </g>
      </svg>
      <div>
        <h1>Risha Agent</h1>
        <p>Automation &amp; Web Scraping — Settings</p>
      </div>
    </div>
    <div class="card">
      <p class="note">
        Risha Agent sends scraped profiles to your Risha backend's
        <code>/api/discovery/ingest</code> endpoint, authenticated with the shared agent secret
        (the same <code>AGENT_CRON_SECRET</code> from your <code>.env</code>).
      </p>
      <label>Backend URL</label>
      <input id="backendUrl" placeholder="http://localhost:3001" />
      <label>Agent secret (AGENT_CRON_SECRET)</label>
      <input id="agentSecret" type="password" placeholder="your-agent-secret" />
      <div>
        <button id="save">Save</button>
        <span id="saved"></span>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
